language = "C"
include_guard = "TOGL_H"
pragma_once = true
cpp_compat = true
autogen_warning = "/* Generated by cbindgen. Do not edit by hand. Regenerated by build.rs. */"
documentation = true
style = "type"

[export]
prefix = ""
item_types = ["enums", "structs", "functions", "constants"]

[parse]
parse_deps = false
