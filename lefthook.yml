pre-commit:
  parallel: true
  commands:
    fmt:
      run: cargo fmt --all -- --check
    clippy:
      run: cargo clippy --all-targets -- -D warnings
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}
    toml-lint:
      glob: "*.toml"
      run: taplo fmt --check {staged_files}

pre-push:
  commands:
    test:
      run: cargo test
